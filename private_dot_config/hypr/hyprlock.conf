# Load colors from matugen generated file
source = ~/.config/hypr/hyprlock-colors.conf

# ── General ───────────────────────────────────────────────
general {
    no_fade_in          = false
    grace               = 0
    disable_loading_bar = false
    hide_cursor         = true
}

# ── Background ────────────────────────────────────────────
background {
    monitor     =
    blur_passes = 2
    blur_size   = 6
    brightness  = 0.6
}

source = ~/.config/hypr/hyprlock-wallpaper.conf

# ── Clock ─────────────────────────────────────────────────
label {
    monitor     =
    text        = $TIME
    color       = $ml_text
    font_size   = 90
    font_family = Maple Mono NF
    position    = -30, 0
    halign      = right
    valign      = top
}

# ── Date ──────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:43200000] date +"%A, %d %B %Y"
    color       = $ml_subtext
    font_size   = 25
    font_family = Maple Mono NF
    position    = -30, -150
    halign      = right
    valign      = top
}

# ── Greeting ──────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "Good $(date +%H | awk '{if ($1 < 12) print "Morning"; else if ($1 < 18) print "Afternoon"; else print "Evening"}'), marc"
    color       = $ml_text
    font_size   = 20
    font_family = Maple Mono NF Bold
    position    = 0, -16%
    halign      = center
    valign      = center
}

# ── Input field ───────────────────────────────────────────
input-field {
    monitor           =
    size              = 220, 50
    outline_thickness = 2
    dots_size         = 0.3
    dots_spacing      = 0.15
    dots_center       = true
    dots_rounding     = -1
    outer_color       = $ml_primary
    inner_color       = $ml_surface
    font_color        = $ml_text
    fade_on_empty     = true
    fade_timeout      = 1000
    placeholder_text  = <i>Password...</i>
    hide_input        = false
    rounding          = 12
    check_color       = $ml_success
    fail_color        = $ml_error
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition   = 300
    position          = 0, 4.5%
    halign            = center
    valign            = bottom
}

# ── Battery ───────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:5000] cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | awk '{print $1"%"}' || echo ""
    color       = $ml_subtext
    font_size   = 16
    font_family = Maple Mono NF
    position    = -1%, 1%
    halign      = right
    valign      = bottom
}
