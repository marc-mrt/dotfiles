general {
    lock_cmd             = hyprlock
    unlock_cmd           = pkill -SIGUSR1 hyprlock
    ignore_dbus_inhibit  = false
    ignore_systemd_inhibit = false
    before_sleep_cmd     = loginctl lock-session
    after_sleep_cmd      = hyprctl dispatch dpms on
}

# ── 1. Dim after 4 min ────────────────────────────────────
listener {
    timeout    = 240
    on-timeout = ddcutil getvcp 10 | grep -oP '(?<=current value =\s{1,10})\d+' > /tmp/mon-brightness && ddcutil setvcp 10 20
    on-resume  = ddcutil setvcp 10 $(cat /tmp/mon-brightness 2>/dev/null || echo 50)
}

# ── 2. Lock after 6 min ───────────────────────────────────
listener {
    timeout  = 360
    on-timeout = loginctl lock-session
}

# ── 3. DPMS off after 8 min ───────────────────────────────
listener {
    timeout  = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── 4. Suspend after 10 min ───────────────────────────────
listener {
    timeout  = 600
    on-timeout = systemctl suspend
}
